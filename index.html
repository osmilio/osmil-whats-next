<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>What's Next for Your Brand? — osmil™</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:#fafaf8;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;font-size:120%}
.card{background:#fff;border:0.5px solid #e8e6e0;border-radius:16px;width:100%;max-width:560px;overflow:hidden}
.header{padding:2rem 2rem 1.5rem;border-bottom:0.5px solid #e8e6e0}
.logo{font-size:11px;font-weight:500;letter-spacing:0.12em;color:#999;text-transform:uppercase;margin-bottom:1.25rem}
.title{font-family:'Playfair Display',serif;font-size:26px;font-weight:400;color:#1a1a1a;line-height:1.2;margin-bottom:0.5rem}
.subtitle{font-size:14px;color:#888;line-height:1.6}
.progress{display:flex;gap:6px;padding:1.25rem 2rem;border-bottom:0.5px solid #e8e6e0}
.pip{height:3px;flex:1;background:#e8e6e0;border-radius:2px;transition:background 0.3s}
.pip.done{background:#1a1a1a}
.pip.active{background:#999}
.body{padding:1.75rem 2rem}
.q-label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:0.6rem}
.question{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:#1a1a1a;line-height:1.35;margin-bottom:1.5rem}
.options{display:flex;flex-direction:column;gap:8px;margin-bottom:1.5rem}
.option{display:flex;align-items:center;gap:12px;padding:12px 16px;border:0.5px solid #e8e6e0;border-radius:8px;cursor:pointer;transition:border-color 0.15s,background 0.15s;font-size:14px;color:#1a1a1a;background:#fff;text-align:left;width:100%}
.option:hover{border-color:#999;background:#fafaf8}
.option.selected{border-color:#1a1a1a;background:#fafaf8}
.dot{width:16px;height:16px;border-radius:50%;border:1.5px solid #ccc;flex-shrink:0;transition:background 0.15s,border-color 0.15s}
.option.selected .dot{background:#1a1a1a;border-color:#1a1a1a}
textarea{width:100%;min-height:80px;padding:12px 14px;border:0.5px solid #e8e6e0;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:14px;color:#1a1a1a;background:#fff;resize:vertical;margin-bottom:1.5rem;line-height:1.5}
textarea:focus{outline:none;border-color:#999}
.nav{display:flex;align-items:center;justify-content:space-between}
.btn{padding:10px 24px;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;letter-spacing:0.04em;border-radius:8px;cursor:pointer;transition:opacity 0.15s,background 0.15s;border:0.5px solid #ccc;background:#fff;color:#1a1a1a}
.btn:hover{background:#fafaf8}
.btn-primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn-primary:hover{opacity:0.85}
.btn-primary:disabled{opacity:0.4;cursor:default}
.step-count{font-size:12px;color:#999}
.loading{padding:3rem 2rem;display:flex;flex-direction:column;align-items:center;gap:1rem}
.spinner{width:28px;height:28px;border:2px solid #e8e6e0;border-top-color:#1a1a1a;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;color:#999}
.result{padding:1.75rem 2rem;animation:fadeIn 0.4s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.result-label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:0.5rem}
.result-headline{font-family:'Playfair Display',serif;font-size:22px;font-weight:400;color:#1a1a1a;margin-bottom:1.25rem;line-height:1.3}
.result-body{font-size:14px;line-height:1.75;color:#333;margin-bottom:1.5rem;border-left:2px solid #e8e6e0;padding-left:1rem}
.next-label{font-size:11px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#999;margin-bottom:0.75rem}
.step-item{display:flex;gap:12px;align-items:flex-start;padding:10px 0;border-bottom:0.5px solid #e8e6e0;font-size:13px;line-height:1.5;color:#1a1a1a}
.step-num{font-size:11px;font-weight:500;color:#999;min-width:18px;padding-top:1px}
.results-card{background:#1a1a1a;border-radius:12px;padding:1.75rem;margin:1.75rem 0;animation:fadeIn 0.6s ease}
.rc-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:1.5rem}
.rc-logo{font-size:10px;font-weight:500;letter-spacing:0.12em;color:#666;text-transform:uppercase}
.rc-badge{font-size:10px;font-weight:500;letter-spacing:0.08em;text-transform:uppercase;color:#666;border:0.5px solid #333;border-radius:20px;padding:4px 10px}
.rc-label{font-size:10px;font-weight:500;letter-spacing:0.1em;text-transform:uppercase;color:#555;margin-bottom:0.5rem}
.rc-headline{font-family:'Playfair Display',serif;font-size:18px;font-weight:400;color:#f5f5f0;line-height:1.25;margin-bottom:1.5rem}
.rc-divider{height:0.5px;background:#2e2e2e;margin-bottom:1.5rem}
.rc-scores{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:1.25rem}
.rc-score{background:#242424;border-radius:8px;padding:12px}
.rc-score-label{font-size:10px;color:#555;text-transform:uppercase;letter-spacing:0.08em;margin-bottom:8px}
.rc-bar-bg{height:2px;background:#2e2e2e;border-radius:2px;margin-bottom:8px}
.rc-bar{height:2px;border-radius:2px;background:#f5f5f0;transition:width 1s ease}
.rc-score-val{font-size:14px;font-weight:500;color:#f5f5f0}
.rc-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:1.5rem}
.rc-pill{font-size:10px;color:#555;border:0.5px solid #2e2e2e;border-radius:20px;padding:4px 10px}
.rc-pill.on{color:#aaa;border-color:#555}
.rc-footer{display:flex;justify-content:space-between;align-items:center}
.rc-footer-l{font-size:10px;color:#444;letter-spacing:0.06em}
.rc-footer-r{font-size:10px;color:#444}
.email-section{background:#fafaf8;border-radius:12px;padding:1.25rem 1.5rem;margin-top:0.5rem}
.email-title{font-family:'Playfair Display',serif;font-size:16px;font-weight:400;color:#1a1a1a;margin-bottom:0.4rem}
.email-sub{font-size:12px;color:#888;margin-bottom:1rem;line-height:1.5}
.email-row{display:flex;gap:8px}
.email-input{flex:1;padding:10px 14px;border:0.5px solid #ccc;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:13px;background:#fff;color:#1a1a1a}
.email-input:focus{outline:none;border-color:#999}
.error{font-size:13px;color:#c0392b;margin-top:0.5rem}
.submitted{padding:2rem;text-align:center;animation:fadeIn 0.4s ease}
.submitted-headline{font-family:'Playfair Display',serif;font-size:20px;font-weight:400;color:#1a1a1a;margin-bottom:0.5rem}
.submitted-sub{font-size:13px;color:#888;line-height:1.6}
</style>
</head>
<body>
<div class="card">
  <div class="header">
    <div class="logo">osmil™</div>
    <div class="title">What's next for your brand?</div>
    <div class="subtitle">Six honest questions. A personal read on where your brand is and where it needs to go.</div>
  </div>
  <div class="progress" id="progress-bar"></div>
  <div id="tool-body"></div>
</div>

<script>
const questions=[
  {id:'trading',label:'Question 1 of 6',q:'How long have you been trading?',type:'options',opts:['Less than a year','1–2 years','2–4 years','4+ years']},
  {id:'brand_origin',label:'Question 2 of 6',q:'How did your current brand come together?',type:'options',opts:['I did it myself','A freelancer helped me','A design agency did it',"I don't really have one yet"]},
  {id:'new_biz',label:'Question 3 of 6',q:'Where does most of your new business come from right now?',type:'options',opts:['Word of mouth and referrals','Social media','My website','Networking and events','A mix of all of these']},
  {id:'friction',label:'Question 4 of 6',q:'When someone asks "do you have a website I can look at?" — how do you feel?',type:'options',opts:['Proud — it does the job well','Fine, but it could be better','A little embarrassed honestly','I usually make an excuse']},
  {id:'upcoming',label:'Question 5 of 6',q:"What's coming up in the next 6–12 months that makes brand feel more urgent?",type:'options',opts:["I want to attract bigger clients","I'm raising money or pitching investors","I'm hiring and need to look credible","I'm launching something new","Nothing specific — I just know it's time"]},
  {id:'feeling',label:'Question 6 of 6',q:'One word — how does your current brand make you feel?',type:'text',placeholder:'e.g. embarrassed, proud, invisible, confused, okay…'}
];

let current=0,answers={},result=null;

function snap5(n){return Math.round(n/5)*5;}

function calcScores(){
  let clarity=30,credibility=30,readiness=30;

  if(answers.trading==='Less than a year'){clarity+=5;credibility+=0;readiness+=10;}
  else if(answers.trading==='1–2 years'){clarity+=10;credibility+=10;readiness+=10;}
  else if(answers.trading==='2–4 years'){clarity+=15;credibility+=15;readiness+=15;}
  else if(answers.trading==='4+ years'){clarity+=20;credibility+=20;readiness+=20;}

  if(answers.brand_origin==='I did it myself'){clarity-=10;credibility-=15;}
  else if(answers.brand_origin==='A freelancer helped me'){clarity+=5;credibility+=0;}
  else if(answers.brand_origin==='A design agency did it'){clarity+=15;credibility+=20;}
  else if(answers.brand_origin==="I don't really have one yet"){clarity-=20;credibility-=20;}

  if(answers.friction==='Proud — it does the job well'){credibility+=20;readiness+=15;}
  else if(answers.friction==='Fine, but it could be better'){credibility+=5;readiness+=5;}
  else if(answers.friction==='A little embarrassed honestly'){credibility-=10;readiness-=10;}
  else if(answers.friction==='I usually make an excuse'){credibility-=20;readiness-=20;}

  if(answers.upcoming==="I want to attract bigger clients"){readiness+=10;}
  else if(answers.upcoming==="I'm raising money or pitching investors"){readiness+=15;}
  else if(answers.upcoming==="I'm hiring and need to look credible"){readiness+=10;}
  else if(answers.upcoming==="I'm launching something new"){readiness+=10;}
  else if(answers.upcoming==="Nothing specific — I just know it's time"){readiness+=5;}

  clarity=Math.min(95,Math.max(10,snap5(clarity)));
  credibility=Math.min(95,Math.max(10,snap5(credibility)));
  readiness=Math.min(95,Math.max(10,snap5(readiness)));

  return{clarity,credibility,readiness};
}

function getPills(){
  const pills=[];
  if(answers.trading) pills.push(answers.trading+' trading');
  if(answers.brand_origin==='I did it myself') pills.push('Self-built brand');
  else if(answers.brand_origin==='A freelancer helped me') pills.push('Freelancer brand');
  else if(answers.brand_origin==='A design agency did it') pills.push('Agency brand');
  else if(answers.brand_origin==="I don't really have one yet") pills.push('No brand yet');
  if(answers.new_biz==='Word of mouth and referrals') pills.push('Referral-led');
  else if(answers.new_biz==='My website') pills.push('Website-led');
  else if(answers.new_biz==='Social media') pills.push('Social-led');
  if(answers.upcoming==="I'm raising money or pitching investors") pills.push('Pre-investment');
  else if(answers.upcoming==="I'm hiring and need to look credible") pills.push('Pre-hire');
  else if(answers.upcoming==="I'm launching something new") pills.push('Pre-launch');
  else if(answers.upcoming==="I want to attract bigger clients") pills.push('Scaling up');
  return pills;
}

function renderProgress(){
  const bar=document.getElementById('progress-bar');
  bar.innerHTML='';
  for(let i=0;i<questions.length;i++){
    const pip=document.createElement('div');
    pip.className='pip'+(i<current?' done':i===current?' active':'');
    bar.appendChild(pip);
  }
}

function renderQuestion(){
  renderProgress();
  const q=questions[current];
  const body=document.getElementById('tool-body');
  let optionsHTML='';
  if(q.type==='options'){
    optionsHTML='<div class="options">'+q.opts.map(o=>`<button class="option${answers[q.id]===o?' selected':''}" data-val="${o}" onclick="selectOption('${q.id}',this)"><span class="dot"></span>${o}</button>`).join('')+'</div>';
  }else{
    optionsHTML=`<textarea id="text-answer" placeholder="${q.placeholder}" oninput="answers['feeling']=this.value;document.getElementById('next-btn').disabled=!this.value.trim()">${answers[q.id]||''}</textarea>`;
  }
  body.innerHTML=`<div class="body"><div class="q-label">${q.label}</div><div class="question">${q.q}</div>${optionsHTML}<div class="nav"><button class="btn" onclick="goBack()" style="${current===0?'visibility:hidden':''}">← Back</button><span class="step-count">${current+1} / ${questions.length}</span><button class="btn btn-primary" id="next-btn" onclick="goNext()" ${!answers[q.id]?'disabled':''}>${current===questions.length-1?'Get my read →':'Next →'}</button></div></div>`;
}

function selectOption(qid,el){
  answers[qid]=el.dataset.val;
  document.querySelectorAll('.option').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  document.getElementById('next-btn').disabled=false;
}

function goBack(){if(current>0){current--;renderQuestion();}}

function goNext(){
  const q=questions[current];
  if(q.type==='text'){const ta=document.getElementById('text-answer');if(!ta||!ta.value.trim())return;answers[q.id]=ta.value.trim();}
  if(!answers[q.id])return;
  current++;
  if(current>=questions.length){showLoading();callAPI();}else{renderQuestion();}
}

function showLoading(){
  renderProgress();
  document.getElementById('tool-body').innerHTML='<div class="loading"><div class="spinner"></div><div class="loading-text">Reading your answers and writing your brand diagnosis…</div></div>';
}

async function callAPI(){
  try{
    const response=await fetch('/api/diagnose',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({answers})});
    result=await response.json();
    showResult();
  }catch(err){
    document.getElementById('tool-body').innerHTML='<div class="body"><div class="error">Something went wrong. Please try again.</div><button class="btn" onclick="current=0;answers={};renderQuestion()" style="margin-top:1rem">Start again</button></div>';
  }
}

function showResult(){
  renderProgress();
  const scores=calcScores();
  const pills=getPills();
  const now=new Date();
  const dateStr=now.toLocaleString('en-GB',{month:'long',year:'numeric'});

  document.getElementById('tool-body').innerHTML=`
    <div class="result">
      <div class="result-label">Your brand read</div>
      <div class="result-headline">${result.headline}</div>
      <div class="result-body">${result.diagnosis}</div>

      <div style="margin-bottom:1.75rem">
        <div class="next-label">What's next</div>
        ${result.steps.map((s,i)=>`<div class="step-item"><span class="step-num">0${i+1}</span><span>${s}</span></div>`).join('')}
      </div>

      <div class="results-card">
        <div class="rc-top">
          <div class="rc-logo">osmil™</div>
          <div class="rc-badge">Results Card</div>
        </div>
        <div class="rc-label">Your diagnosis</div>
        <div class="rc-headline">${result.headline}</div>
        <div class="rc-divider"></div>
        <div class="rc-scores">
          <div class="rc-score">
            <div class="rc-score-label">Clarity</div>
            <div class="rc-bar-bg"><div class="rc-bar" id="bar-clarity" style="width:0%"></div></div>
            <div class="rc-score-val">${scores.clarity}%</div>
          </div>
          <div class="rc-score">
            <div class="rc-score-label">Credibility</div>
            <div class="rc-bar-bg"><div class="rc-bar" id="bar-credibility" style="width:0%"></div></div>
            <div class="rc-score-val">${scores.credibility}%</div>
          </div>
          <div class="rc-score">
            <div class="rc-score-label">Readiness</div>
            <div class="rc-bar-bg"><div class="rc-bar" id="bar-readiness" style="width:0%"></div></div>
            <div class="rc-score-val">${scores.readiness}%</div>
          </div>
        </div>
        <div class="rc-pills">
          ${pills.map(p=>`<div class="rc-pill on">${p}</div>`).join('')}
        </div>
        <div class="rc-footer">
          <div class="rc-footer-l">osmil.io — What's next?</div>
          <div class="rc-footer-r">${dateStr}</div>
        </div>
      </div>

      <div class="email-section">
        <div class="email-title">Want to talk this through?</div>
        <div class="email-sub">Leave your email and Oli will send you a personal note — no hard sell, just a proper conversation about what's next for your brand.</div>
        <div class="email-row">
          <input type="email" class="email-input" id="email-input" placeholder="your@email.com"/>
          <button class="btn btn-primary" onclick="submitEmail()">Send it →</button>
        </div>
        <div id="email-error" class="error" style="display:none">Please enter a valid email address.</div>
      </div>
    </div>`;

  setTimeout(()=>{
    document.getElementById('bar-clarity').style.width=scores.clarity+'%';
    document.getElementById('bar-credibility').style.width=scores.credibility+'%';
    document.getElementById('bar-readiness').style.width=scores.readiness+'%';
  },100);
}

async function submitEmail(){
  const email=document.getElementById('email-input').value.trim();
  const errEl=document.getElementById('email-error');
  if(!email||!email.includes('@')){errEl.style.display='block';return;}
  errEl.style.display='none';
  try{
    await fetch('https://formspree.io/f/maqklydd',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,headline:result.headline,answers})});
  }catch(e){}
  document.getElementById('tool-body').innerHTML='<div class="submitted"><div class="submitted-headline">You\'re on Oli\'s radar.</div><div class="submitted-sub">Expect a straight-talking note soon. In the meantime, drop a line directly to <a href="mailto:design@olivermilburn.co.uk" style="color:#1a1a1a;font-weight:500;">design@olivermilburn.co.uk</a></div></div>';
}

renderQuestion();
</script>
</body>
</html>
